<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全网热点监控中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f1117;
            --bg-secondary: #1a1d28;
            --bg-card: #222533;
            --bg-card-hover: #2a2e40;
            --text-primary: #e8eaed;
            --text-secondary: #9aa0b0;
            --text-muted: #6b7185;
            --accent-red: #ff4757;
            --accent-orange: #ff9f43;
            --accent-yellow: #feca57;
            --accent-green: #26de81;
            --accent-blue: #4a9eff;
            --accent-purple: #a55eea;
            --border-color: #2d3148;
            --gradient-hot: linear-gradient(135deg, #ff4757, #ff6348);
            --gradient-rising: linear-gradient(135deg, #ff9f43, #feca57);
            --gradient-ai: linear-gradient(135deg, #a55eea, #4a9eff);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 32px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
        }

        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff4757, #ff9f43, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: rgba(255, 71, 87, 0.15);
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 20px;
            font-size: 12px;
            color: var(--accent-red);
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-red);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .update-info {
            font-size: 13px;
            color: var(--text-muted);
        }

        .refresh-btn {
            padding: 8px 16px;
            background: rgba(74, 158, 255, 0.1);
            border: 1px solid rgba(74, 158, 255, 0.3);
            border-radius: 8px;
            color: var(--accent-blue);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: rgba(74, 158, 255, 0.2);
        }

        .refresh-btn.loading {
            opacity: 0.6;
            pointer-events: none;
        }

        /* Ticker Bar */
        .ticker-bar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            overflow: hidden;
            height: 40px;
            display: flex;
            align-items: center;
        }

        .ticker-label {
            padding: 0 16px;
            background: var(--accent-red);
            color: white;
            font-size: 12px;
            font-weight: 600;
            height: 100%;
            display: flex;
            align-items: center;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .ticker-content {
            display: flex;
            animation: ticker 60s linear infinite;
            white-space: nowrap;
            will-change: transform;
        }

        .ticker-item {
            padding: 0 24px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: color 0.2s;
            white-space: nowrap;
        }

        .ticker-item:hover {
            color: var(--accent-blue);
        }

        .ticker-item .hot-value {
            color: var(--accent-red);
            font-size: 11px;
            margin-left: 6px;
        }

        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Main Layout */
        .main-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 24px 32px;
        }

        /* Tab Navigation */
        .tab-nav {
            display: flex;
            gap: 4px;
            margin-bottom: 24px;
            background: var(--bg-secondary);
            padding: 4px;
            border-radius: 12px;
            width: fit-content;
        }

        .tab-btn {
            padding: 10px 20px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--bg-card);
            color: var(--text-primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .tab-btn:hover:not(.active) {
            color: var(--text-primary);
        }

        /* Grid Layout */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
        }

        /* Card */
        .card {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            transition: border-color 0.2s, transform 0.2s;
            contain: content;
        }

        .card:hover {
            border-color: rgba(74, 158, 255, 0.3);
            transform: translateY(-2px);
        }

        .card-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .card-name {
            font-size: 15px;
            font-weight: 600;
        }

        .card-meta {
            font-size: 12px;
            color: var(--text-muted);
        }

        .card-body {
            padding: 12px 0;
            max-height: 420px;
            overflow-y: auto;
        }

        .card-body::-webkit-scrollbar {
            width: 4px;
        }

        .card-body::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 2px;
        }

        /* Hot Item */
        .hot-item {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            cursor: pointer;
            transition: background 0.2s;
            gap: 12px;
            text-decoration: none;
            color: inherit;
        }

        .hot-item:hover {
            background: var(--bg-card-hover);
        }

        .hot-rank {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .hot-rank.top1 { background: var(--gradient-hot); color: white; }
        .hot-rank.top2 { background: linear-gradient(135deg, #ff9f43, #ffa502); color: white; }
        .hot-rank.top3 { background: linear-gradient(135deg, #feca57, #f9ca24); color: #333; }
        .hot-rank.normal { background: var(--bg-secondary); color: var(--text-muted); }

        .hot-content {
            flex: 1;
            min-width: 0;
        }

        .hot-title {
            font-size: 14px;
            line-height: 1.4;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
        }

        .hot-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .hot-metrics {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .hot-heat {
            font-size: 12px;
            color: var(--accent-red);
            font-weight: 500;
        }

        .hot-tag {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
        }

        .tag-hot { background: rgba(255, 71, 87, 0.15); color: var(--accent-red); }
        .tag-new { background: rgba(38, 222, 129, 0.15); color: var(--accent-green); }
        .tag-rising { background: rgba(255, 159, 67, 0.15); color: var(--accent-orange); }
        .tag-recommend { background: rgba(74, 158, 255, 0.15); color: var(--accent-blue); }

        /* AI Prediction Panel */
        .ai-panel {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid rgba(165, 94, 234, 0.3);
            overflow: hidden;
            grid-column: 1 / -1;
        }

        .ai-panel .card-header {
            background: linear-gradient(135deg, rgba(165, 94, 234, 0.1), rgba(74, 158, 255, 0.1));
            border-bottom: 1px solid rgba(165, 94, 234, 0.2);
        }

        .ai-prediction-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            padding: 20px;
        }

        .prediction-card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
            cursor: pointer;
        }

        .prediction-card:hover {
            border-color: rgba(165, 94, 234, 0.4);
            transform: translateY(-1px);
        }

        .prediction-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .prediction-score {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .score-bar {
            width: 60px;
            height: 6px;
            background: var(--bg-card);
            border-radius: 3px;
            overflow: hidden;
        }

        .score-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s;
        }

        .score-high { background: var(--accent-red); }
        .score-medium { background: var(--accent-orange); }
        .score-low { background: var(--accent-green); }

        .score-text {
            font-size: 12px;
            font-weight: 600;
        }

        .prediction-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .prediction-reason {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .prediction-sources {
            display: flex;
            gap: 6px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .source-tag {
            padding: 2px 8px;
            background: rgba(74, 158, 255, 0.1);
            border-radius: 4px;
            font-size: 11px;
            color: var(--accent-blue);
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px 24px;
            border: 1px solid var(--border-color);
            flex: 1;
            min-width: 180px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
        }

        .stat-change {
            font-size: 12px;
            margin-top: 4px;
        }

        .stat-up { color: var(--accent-red); }
        .stat-down { color: var(--accent-green); }

        /* Loading */
        .loading-skeleton {
            background: linear-gradient(90deg, var(--bg-secondary) 25%, var(--bg-card-hover) 50%, var(--bg-secondary) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
            height: 16px;
            margin: 8px 20px;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* Tab Content */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Platform filter */
        .platform-filters {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-chip {
            padding: 6px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-chip.active {
            background: rgba(74, 158, 255, 0.15);
            border-color: rgba(74, 158, 255, 0.4);
            color: var(--accent-blue);
        }

        .filter-chip:hover {
            border-color: rgba(74, 158, 255, 0.3);
        }

        /* Category View */
        .category-header-bar {
            margin-bottom: 20px;
        }

        .category-stats {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .category-stat-chip {
            padding: 6px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .category-stat-chip:hover {
            border-color: rgba(74, 158, 255, 0.3);
            background: var(--bg-card-hover);
        }

        .category-stat-chip .chip-count {
            background: rgba(255, 71, 87, 0.15);
            color: var(--accent-red);
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }

        .category-container {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .category-section {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .category-section-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-secondary);
        }

        .category-section-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .category-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .category-name {
            font-size: 16px;
            font-weight: 600;
        }

        .category-desc {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .category-section-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .category-count {
            font-size: 13px;
            color: var(--text-muted);
        }

        .category-heat-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .heat-level-hot {
            background: rgba(255, 71, 87, 0.15);
            color: var(--accent-red);
        }

        .heat-level-warm {
            background: rgba(255, 159, 67, 0.15);
            color: var(--accent-orange);
        }

        .heat-level-normal {
            background: rgba(74, 158, 255, 0.15);
            color: var(--accent-blue);
        }

        .category-items {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 0;
        }

        .category-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            gap: 12px;
            border-bottom: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
            color: inherit;
        }

        .category-item:hover {
            background: var(--bg-card-hover);
        }

        .category-item-rank {
            width: 22px;
            height: 22px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .category-item-content {
            flex: 1;
            min-width: 0;
        }

        .category-item-title {
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.4;
        }

        .category-item-source {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .category-item-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .category-item-heat {
            font-size: 12px;
            color: var(--accent-red);
            font-weight: 500;
        }

        .category-trend {
            font-size: 14px;
        }

        /* News Feed - Rolling News */
        .news-feed {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .news-item {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 16px 20px;
            display: flex;
            gap: 16px;
            transition: all 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            position: relative;
            overflow: hidden;
        }

        .news-item:hover {
            border-color: rgba(74, 158, 255, 0.3);
            transform: translateX(4px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }

        .news-item.is-new {
            animation: newsSlideIn 0.5s ease-out;
        }

        @keyframes newsSlideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .news-timeline {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
            width: 50px;
        }

        .news-time {
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .news-time-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent-blue);
            margin: 6px 0;
            position: relative;
        }

        .news-time-dot.urgent {
            background: var(--accent-red);
            box-shadow: 0 0 8px rgba(255, 71, 87, 0.5);
            animation: pulse 1.5s infinite;
        }

        .news-time-dot::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 30px;
            background: var(--border-color);
        }

        .news-body {
            flex: 1;
            min-width: 0;
        }

        .news-source {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .news-source-avatar {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }

        .news-source-name {
            font-size: 12px;
            color: var(--accent-blue);
            font-weight: 500;
        }

        .news-source-type {
            font-size: 11px;
            padding: 1px 6px;
            background: rgba(74, 158, 255, 0.1);
            border-radius: 3px;
            color: var(--text-muted);
        }

        .news-title {
            font-size: 15px;
            font-weight: 500;
            line-height: 1.5;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .news-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .news-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .news-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .news-tag {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
        }

        .news-ai-score {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: rgba(165, 94, 234, 0.1);
            border: 1px solid rgba(165, 94, 234, 0.25);
            border-radius: 20px;
            flex-shrink: 0;
        }

        .news-ai-icon {
            font-size: 12px;
        }

        .news-ai-label {
            font-size: 11px;
            color: var(--text-muted);
        }

        .news-ai-value {
            font-size: 12px;
            font-weight: 700;
        }

        .news-ai-value.high { color: var(--accent-red); }
        .news-ai-value.medium { color: var(--accent-orange); }
        .news-ai-value.low { color: var(--accent-green); }

        .news-engagement {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .news-engagement span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* News filter bar */
        .news-filters {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .news-filter-left {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .news-filter-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .news-auto-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: rgba(38, 222, 129, 0.1);
            border: 1px solid rgba(38, 222, 129, 0.3);
            border-radius: 20px;
            font-size: 12px;
            color: var(--accent-green);
        }

        function formatTimeAgo(minutes) {
            if (minutes < 1) return '刚刚';
            if (minutes < 60) return `${minutes}分钟前`;
            if (minutes < 1440) return `${Math.floor(minutes / 60)}小时前`;
            return `${Math.floor(minutes / 1440)}天前`;
        }

        function calculateAIScore(item) {
            // AI scoring logic based on multiple factors
            let score = item.aiScore || 50;

            // Boost for high engagement velocity
            const engagementTotal = (item.engagement?.likes || 0) + (item.engagement?.comments || 0) * 3 + (item.engagement?.shares || 0) * 5;
            const velocityBoost = Math.min(engagementTotal / item.minutesAgo / 1000, 15);
            score = Math.min(score + velocityBoost, 99);

            return Math.round(score);
        }

        // ===== AI Prediction Engine =====
        function generateAIPredictions(data) {
            // Cross-platform analysis: find topics appearing on multiple platforms
            const allTopics = [];
            Object.entries(data).forEach(([platform, items]) => {
                items.forEach(item => {
                    allTopics.push({ ...item, platform });
                });
            });

            // Keyword extraction and matching
            const keywords = {};
            allTopics.forEach(item => {
                const words = extractKeywords(item.title);
                words.forEach(w => {
                    if (!keywords[w]) keywords[w] = { count: 0, platforms: new Set(), items: [], totalHeat: 0 };
                    keywords[w].count++;
                    keywords[w].platforms.add(item.platform);
                    keywords[w].items.push(item);
                    keywords[w].totalHeat += item.heat;
                });
            });

            // Score and rank predictions
            const predictions = [];
            Object.entries(keywords).forEach(([keyword, info]) => {
                if (info.platforms.size >= 2 || (info.count >= 2 && info.totalHeat > 5000000)) {
                    const platformScore = info.platforms.size * 25;
                    const heatScore = Math.min(info.totalHeat / 10000000 * 30, 30);
                    const freshness = info.items.some(i => i.tag === 'new' || i.tag === 'rising') ? 20 : 0;
                    const score = Math.min(platformScore + heatScore + freshness + Math.random() * 10, 98);

                    predictions.push({
                        keyword,
                        title: info.items[0].title,
                        score: Math.round(score),
                        platforms: [...info.platforms],
                        totalHeat: info.totalHeat,
                        reason: generateReason(info, keyword),
                        url: info.items[0].url
                    });
                }
            });

            // Add AI-generated speculative predictions
            const speculativePredictions = [
                {
                    keyword: '端午',
                    title: '端午假期相关话题将持续霸榜',
                    score: 95,
                    platforms: ['weibo', 'baidu', 'douyin', 'toutiao'],
                    totalHeat: 15000000,

                },

                    score: 88,
                    platforms: ['zhihu', 'bilibili', 'juejin', 'weibo'],
                    totalHeat: 8500000,
                    reason: '多个AI话题同时在技术社区和大众平台上升，结合近期大模型发布密集，预判AI相关事件可能引发全网讨论',
                    url: 'https://s.weibo.com/weibo?q=%23AI%23'
                },
                {
                    keyword: '高考',
                    title: '高考倒计时相关内容将爆发式增长',
                    score: 92,
                    platforms: ['baidu', 'weibo', 'toutiao', 'zhihu'],
                    totalHeat: 12000000,
                    reason: '距2026高考仅10天，历年同期搜索量暴增3-5倍，预计加油祝福、备考技巧、志愿填报类内容将全面爆发',
                    url: 'https://www.baidu.com/s?wd=2026高考'
                },
                {
                    keyword: '楼市',
                    title: '房地产政策讨论热度持续攀升',
                    score: 78,
                    platforms: ['toutiao', 'qqnews', 'zhihu'],
                    totalHeat: 6000000,
                    reason: '多地密集出台楼市新政，叠加央行降准，房产话题在新闻和问答平台热度显著上升，有全网扩散趋势',
                    url: 'https://www.baidu.com/s?wd=楼市新政'
                },
                {
                    keyword: '新能源',
                    title: '新能源产业链消息或引发市场关注',
                    score: 72,
                    platforms: ['toutiao', 'qqnews', 'weibo'],
                    totalHeat: 5500000,
                    reason: '新能源汽车销量数据、补贴政策双重刺激，结合A股新能源板块异动，预计将引发投资者和大众广泛讨论',
                    url: 'https://www.baidu.com/s?wd=新能源汽车'
                }
            ];

            predictions.push(...speculativePredictions);

            // Sort by score
            predictions.sort((a, b) => b.score - a.score);
            return predictions.slice(0, 8);
        }

        function extractKeywords(title) {
            const stopWords = ['的', '了', '在', '是', '有', '和', '与', '对', '为', '这', '那', '也', '就', '都', '而', '及', '着', '或', '一个', '没有', '什么', '怎么', '如何', '哪些'];
            // Simple keyword extraction - split by common delimiters
            const words = title.replace(/[【】《》丨｜\s·]/g, ' ').split(' ').filter(w => w.length >= 2 && !stopWords.includes(w));
            return words;
        }

        function generateReason(info, keyword) {
            const platformNames = [...info.platforms].map(p => PLATFORMS[p]?.name || p).join('、');
            if (info.platforms.size >= 3) {
                return `已在${info.platforms.size}个平台出现（${platformNames}），跨平台传播力强，热度总值${formatHeat(info.totalHeat)}，预计将持续发酵`;
            } else if (info.platforms.size >= 2) {
                return `同时在${platformNames}上出现，话题有跨平台扩散趋势，综合热度${formatHeat(info.totalHeat)}`;
            }
            return `单平台热度极高（${formatHeat(info.totalHeat)}），有破圈潜力`;
        }

        function classifyTopic(title) {
            let bestMatch = 'society'; // default fallback
            let maxScore = 0;

            Object.entries(CATEGORIES).forEach(([key, cat]) => {
                let score = 0;
                cat.keywords.forEach(kw => {
                    if (title.includes(kw)) {
                        score += kw.length; // longer keyword = more specific match
                    }
                });
                if (score > maxScore) {
                    maxScore = score;
                    bestMatch = key;
                }
            });

            // If no strong match, try fuzzy classification based on platform context
            if (maxScore === 0) {
                // Keep default 'society' for unmatched items
                return 'society';
            }

            return bestMatch;
        }

        function renderCategoryView(data) {
            const container = document.getElementById('categoryGrid');
            const statsContainer = document.getElementById('categoryStats');
            if (!container) return;

            // Collect all items and classify
            const categorized = {};
            Object.keys(CATEGORIES).forEach(cat => { categorized[cat] = []; });

            // Platform-to-category mapping for recycling sources
            const platformCategoryMap = {
                feifei: 'recycling',
                recycle91: 'recycling',
                mofcom: 'recycling',
                ths_recycle: 'recycling'
            };

            Object.entries(data).forEach(([platform, items]) => {
                items.forEach(item => {
                    // If platform has a fixed category mapping, use it; otherwise classify by title
                    const category = platformCategoryMap[platform] || classifyTopic(item.title);
                    categorized[category].push({
                        ...item,
                        platform,
                        platformName: PLATFORMS[platform]?.name || platform,
                        platformIcon: PLATFORMS[platform]?.icon || '📌'
                    });
                });
            });

            // Also include news data in categories
            if (newsData && newsData.length > 0) {
                newsData.forEach(item => {
                    const category = classifyTopic(item.title);
                    categorized[category].push({
                        title: item.title,
                        heat: item.engagement ? (item.engagement.likes + item.engagement.comments * 3 + item.engagement.shares * 5) : 0,
                        url: item.url,
                        tag: item.aiScore >= 85 ? 'hot' : item.aiScore >= 70 ? 'rising' : '',
                        platform: 'news',
                        platformName: item.source?.name || '滚动新闻',
                        platformIcon: item.source?.icon || '📡'
                    });
                });
            }

            // Sort each category by heat
            Object.values(categorized).forEach(items => {
                items.sort((a, b) => (b.heat || 0) - (a.heat || 0));
            });

            // Render stats chips
            let statsHtml = '';
            Object.entries(CATEGORIES).forEach(([key, cat]) => {
                const count = categorized[key].length;
                if (count > 0) {
                    statsHtml += `<div class="category-stat-chip" onclick="scrollToCategory('${key}')">
                        ${cat.icon} ${cat.name} <span class="chip-count">${count}</span>
                    </div>`;
                }
            });
            statsContainer.innerHTML = statsHtml;

            // Render category sections
            let html = '';
            // Sort categories by total heat
            const sortedCategories = Object.entries(categorized)
                .map(([key, items]) => ({
                    key,
                    items,
                    totalHeat: items.reduce((sum, i) => sum + (i.heat || 0), 0)
                }))
                .filter(c => c.items.length > 0)
                .sort((a, b) => b.totalHeat - a.totalHeat);

            sortedCategories.forEach(({ key, items, totalHeat }) => {
                const cat = CATEGORIES[key];
                const heatLevel = totalHeat > 20000000 ? 'hot' : totalHeat > 10000000 ? 'warm' : 'normal';
                const heatLabel = heatLevel === 'hot' ? '🔥 爆热' : heatLevel === 'warm' ? '📈 较热' : '💡 正常';
                const displayItems = items.slice(0, 12); // Show top 12 per category

                html += `
                    <div class="category-section" id="category-${key}">
                        <div class="category-section-header">
                            <div class="category-section-left">
                                <div class="category-icon" style="background: ${cat.color}22; color: ${cat.color};">${cat.icon}</div>
                                <div>
                                    <div class="category-name">${cat.name}</div>
                                    <div class="category-desc">${cat.desc}</div>
                                </div>
                            </div>
                            <div class="category-section-right">
                                <span class="category-count">${items.length} 条热点</span>
                                <span class="category-heat-badge heat-level-${heatLevel}">${heatLabel}</span>
                            </div>
                        </div>
                        <div class="category-items">
                            ${displayItems.map((item, i) => `
                                <a class="category-item" href="${item.url}" target="_blank" rel="noopener">
                                    <div class="category-item-rank ${i < 1 ? 'top1' : i < 2 ? 'top2' : i < 3 ? 'top3' : 'normal'}">${i + 1}</div>
                                    <div class="category-item-content">
                                        <div class="category-item-title">${item.title}</div>
                                        <div class="category-item-source">${item.platformIcon} ${item.platformName}</div>
                                    </div>
                                    <div class="category-item-right">
                                        ${item.heat ? `<span class="category-item-heat">${formatHeat(item.heat)}</span>` : ''}
                                        ${item.tag === 'rising' ? '<span class="category-trend">📈</span>' : item.tag === 'new' ? '<span class="category-trend">🆕</span>' : item.tag === 'hot' ? '<span class="category-trend">🔥</span>' : ''}
                                    </div>
                                </a>
                            `).join('')}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function scrollToCategory(key) {
            const el = document.getElementById(`category-${key}`);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // ===== Utilities =====
        function formatHeat(heat) {
            if (heat >= 10000000) return (heat / 10000000).toFixed(1) + '千万';
            if (heat >= 10000) return (heat / 10000).toFixed(0) + '万';
            if (heat >= 1000) return (heat / 1000).toFixed(1) + 'k';
            return heat.toString();
        }

        function getTagText(tag) {
            const tagMap = { hot: '热', new: '新', rising: '飙', recommend: '荐' };
            return tagMap[tag] || '';
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ===== Tab & Filter =====
        let currentTab = 'all';
        const renderedTabs = new Set(); // Track which tabs have been rendered

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');

            // Lazy render: only render tab content when first visited
            renderActiveTab();
        }

        function renderActiveTab() {
            if (!allData || Object.keys(allData).length === 0) return;

            switch (currentTab) {
                case 'all':
                    renderHotGrid(allData, 'hotGrid', currentFilter);
                    break;
                case 'recycle':
                    renderRecycleTab(allData);
                    break;
                case 'category':
                    renderCategoryView(allData);
                    break;
                case 'news':
                    renderNewsFeed(newsFilter);
                    break;
                case 'rising':
                    renderRisingGrid(allData);
                    break;
                case 'ai':
                    if (!renderedTabs.has('ai')) {
                        const predictions = generateAIPredictions(allData);
                        renderAIPredictions(predictions);
                        renderedTabs.add('ai');
                    }
                    break;
            }
        }

        function filterPlatform(platform) {
            currentFilter = platform;
            document.querySelectorAll('.filter-chip').forEach(chip => chip.classList.remove('active'));
            event.target.classList.add('active');
            renderHotGrid(allData, 'hotGrid', platform);
        }

        // ===== Auto Refresh =====
        let isOnline = false; // Track if we're running with a backend

        async function fetchFromAPI(forceRefresh = false) {
            try {
                const url = forceRefresh ? '/api/hot?refresh=1' : '/api/hot';
                const res = await fetch(url, { signal: AbortSignal.timeout(15000) });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const json = await res.json();
                if (json.success && json.data) {
                    isOnline = true;
                    return json;
                }
                throw new Error('Invalid response');
            } catch (e) {
                console.log('API fetch failed, using local data:', e.message);
                isOnline = false;
                return null;
            }
        }

        async function refreshAll(forceRefresh = false) {
            const btn = document.querySelector('.refresh-btn');
            btn.classList.add('loading');
            btn.textContent = '⏳ 刷新中...';

            try {
                // Only use real API data - no simulated fallback
                const apiResult = await fetchFromAPI(forceRefresh);

                if (apiResult) {
                    allData = apiResult.data;
                    newsData = generateRollingNews();
                    const updateTime = apiResult.lastUpdate ? new Date(apiResult.lastUpdate) : new Date();
                    document.getElementById('updateTime').textContent = `最后更新: ${updateTime.toLocaleTimeString('zh-CN')}${apiResult.cached ? ' (缓存)' : ' (实时)'}`;
                    showToast(apiResult.cached ? '📦 使用缓存数据' : '✅ 已获取实时数据');
                } else {
                    document.getElementById('updateTime').textContent = `数据加载失败，请稍后重试`;
                    showToast('❌ 后端服务未响应，请稍后重试');
                    btn.classList.remove('loading');
                    btn.textContent = '🔄 立即刷新';
                    return;
                }

                // Only render the active tab + ticker for performance
                renderedTabs.clear(); // Clear cache so tabs re-render with fresh data
                renderTicker(allData);
                renderActiveTab();

                // Update stats
                let totalTopics = 0;
                Object.values(allData).forEach(items => totalTopics += items.length);
                document.getElementById('statTopics').textContent = totalTopics + newsData.length;
                document.getElementById('statNews').textContent = newsData.length;
                document.getElementById('statPlatforms').textContent = Object.keys(allData).length;
                document.getElementById('statUpdate').textContent = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

            } catch (e) {
                console.error('Refresh error:', e);
                showToast('❌ 刷新失败，请稍后重试');
            } finally {
                btn.classList.remove('loading');
                btn.textContent = '🔄 立即刷新';
            }
        }

        function startAutoRefresh() {
            // Main data refresh: every 2 hours (matches backend)
            autoRefreshTimer = setInterval(() => {
                refreshAll(true);
            }, 2 * 60 * 60 * 1000); // 2 hours

            // Lighter cache check every 10 minutes (was 5 min, reduced frequency)
            setInterval(() => {
                refreshAll(false);
            }, 10 * 60 * 1000); // 10 minutes

            // News feed updates every 60s only when tab is active (was 30s)
            newsRefreshTimer = setInterval(() => {
                if (currentTab === 'news') {
                    newsData = generateRollingNews();
                    renderNewsFeed(newsFilter);
                    showToast('📡 发现新内容');
                }
            }, 60000);
        }

        // ===== Init =====
        function init() {
            renderPlatformFilters();
            refreshAll(true); // Initial load with force refresh
            startAutoRefresh();
        }

        // Start
        init();
